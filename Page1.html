<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-PageCode</title>
    <style>
        body{
            background-color: black;
            -webkit-user-select: none;
            -ms-user-select: none;
            -moz-user-select: none;
            -o-user-select: none;
            user-select: none;
        }
        #text1{
            position: fixed;
            top: 10%;
            left: 50%;
            transform: translate(-50%,-50%);
            color: white;
            font-size: 40px;
            font-weight: 200;
            transition: transform 0.5s ease;
        }
        #text1:hover{
            transform: translate(-50%,-50%) scale(1.5);
        }
        #text2{
            position: fixed;
            top: 10%;
            left: 50%;
            transform: translate(-50%,-50%);
            font-weight: 200;
            white-space: nowrap;
        }
        #div_id1{
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            width: 50%;
            height: 50%;
            background-color: white;
            border-radius: 10px;
            border: 4px solid transparent;
            transition: border-color 0.3s ease;
        }
        #div_id1:hover{
            border-color: rgb(194, 102, 255)
        }
        #ul1{
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            width: 400px;
            font-size: 20px;
        }
        #btn1{
            position: fixed;
            top: 90%;
            left: 35%;
            transform: translate(-50%,-50%);
            width: 20%;
            height: 7.5%;
            border: none;
            border-radius: 10px;
            background-color: rgb(0, 0, 0);
            color: white;
            transition: background-color 0.5s ease;
        }
        #btn1:hover{
            background-color: rgb(153, 0, 255);
        }
        #btn2{
            position: fixed;
            top: 90%;
            left: 65%;
            transform: translate(-50%,-50%);
            width: 20%;
            height: 7.5%;
            border: none;
            border-radius: 10px;
            background-color: rgb(0, 0, 0);
            color: white;
            transition: background-color 0.5s ease;
        }
        #btn2:hover{
            background-color: rgb(153, 0, 255);
        }
    </style>
</head>
<body>
    <h1 id="text1">Hello,World!</h1>
    <div id="div_id1">
        <h1 id="text2">前端HTML CSS JavaScript</h1>
        <ul id="ul1">
            <li>2026年3~4月成功做出网页</li>
            <li>2026年4~5月成功做出带CSS和JavaScript的网页,接触GitHub</li>
            <li>2026年4~5月成功发布托管在GitHub上的第一个网站</li>
            <li>2026年6月开始开发Ghvswebtpc</li>
        </ul>
        <button id="btn1" onclick="window.location.href='./index.html'">返回</button>
        <button id="btn2" onclick="window.location.href='./Page2.html'">下一页</button>
    </div>
    <script>
        document.addEventListener("contextmenu",(NoCtm) => {
            NoCtm.preventDefault();
        })
    </script>
</body>
</html>
