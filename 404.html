<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T-PageCode</title>
    <style>
        body{
            background-color: black;
            -webkit-user-select: none;
            -ms-user-select: none;
            -moz-user-select: none;
            -o-user-select: none;
            user-select: none;
        }
        #text1{
            position: fixed;
            top: 10%;
            left: 50%;
            transform: translate(-50%,-50%);
            color: white;
            font-size: 40px;
            font-weight: 200;
            transition: transform 0.5s ease;
        }
        #text1:hover{
            transform: translate(-50%,-50%) scale(1.5);
        }
        #text2{
            position: fixed;
            top: 2.5%;
            left: 50%;
            transform: translate(-50%,-50%);
            font-weight: 200;
            white-space: nowrap;
        }
        #text3{
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            font-weight: 200;
            white-space: nowrap;
        }
        #text4{
            position: fixed;
            top: 20%;
            left: 50%;
            transform: translate(-50%,-50%);
            font-weight: 200;
            background: linear-gradient(90deg,rgb(230, 187, 255),rgb(174, 0, 255));
            width: 100px;
            height: 100px;
            white-space: nowrap;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 50%;
            font-size: 70px;
            color: white;
        }
        #div_id1{
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            width: 50%;
            height: 55%;
            background-color: white;
            border-radius: 10px;
            border: 4px solid transparent;
            transition: border-color 0.3s ease;
        }
        #div_id1:hover{
            border-color: rgb(194, 102, 255)
        }
        #btn1{
            position: fixed;
            top: 90%;
            left: 50%;
            transform: translate(-50%,-50%);
            width: 20%;
            height: 7.5%;
            border: none;
            border-radius: 10px;
            background-color: rgb(0, 0, 0);
            color: white;
            transition: background-color 0.5s ease;
        }
        #btn1:hover{
            background-color: rgb(153, 0, 255);
        }
    </style>
</head>
<body>
    <h1 id="text1">404 Not Found</h1>
    <div id="div_id1">
        <h1 id="text2">页面未找到</h1>
        <h1 id="text3">您请求的页面未找到</h1>
        <h1 id="text4">×</h1>
        <button id="btn1" onclick="window.location.href='./index.html'">返回主页</button>
    </div>
    <script>
        document.addEventListener("contextmenu",(NoCtm) => {
            NoCtm.preventDefault();
        })
    </script>
</body>
</html>
